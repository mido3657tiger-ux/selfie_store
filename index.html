<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="سيلفي ستور — موبايلات جديد زيرو وكسر زيرو وإكسسوارات. شارع العباسي، المنصورة." />
  <title>Selfie Store — سيلفي ستور</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════ HEADER ══════════════════════════════ -->
  <header class="site-header">
    <div class="header-inner">

      <div class="logo">
        <span class="logo-en">Selfie Store</span>
        <span class="logo-ar">سيلفي ستور · المنصورة</span>
      </div>

      <button
        id="theme-toggle"
        class="theme-btn"
        aria-label="تغيير المظهر"
        title="Light / Dark"
      >☾</button>

    </div>
  </header>

  <!-- ══════════════════════════════ HERO ════════════════════════════════ -->
  <section class="hero">
    <p class="hero-eyebrow">شارع العباسي · المنصورة · إدارة أبو عبد الله</p>
    <h1 class="hero-title">
      كل الموبايلات<br /><strong>في مكان واحد.</strong>
    </h1>
    <p class="hero-sub">جديد زيرو، كسر زيرو، وإكسسوارات أصلية — بأفضل الأسعار.</p>
  </section>

  <!-- ══════════════════════════════ FILTERS ═════════════════════════════ -->
  <div class="filters-wrap">
    <button class="filter-btn active-filter" data-filter="all">الكل</button>
    <button class="filter-btn" data-filter="new">جديد زيرو</button>
    <button class="filter-btn" data-filter="used">كسر زيرو</button>
    <button class="filter-btn" data-filter="accessories">إكسسوارات</button>
  </div>

  <!-- ══════════════════════════════ GRID ════════════════════════════════ -->
  <main class="grid-section">
    <div id="products-grid"></div>
  </main>

  <!-- ══════════════════════════════ FOOTER ══════════════════════════════ -->
  <div class="divider"></div>
  <footer class="site-footer">
    <span class="footer-logo">Selfie Store</span>
    <div class="footer-info">
      <span>شارع العباسي، المنصورة</span>
      <a href="https://wa.me/201030300355" target="_blank" rel="noopener noreferrer">
        01030300355
      </a>
    </div>
  </footer>

  <!-- App Script -->
  <script src="app.js"></script>
</body>
</html>
